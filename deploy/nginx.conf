# ──────────────────────────────────────────────────────────────
# Spark — nginx reverse proxy config.
# Install to:  /etc/nginx/sites-available/spark
# Then:        ln -s /etc/nginx/sites-available/spark /etc/nginx/sites-enabled/
#              nginx -t && systemctl reload nginx
#
# SSL is issued by Let's Encrypt via certbot (see DEPLOY.md §5).
# ──────────────────────────────────────────────────────────────

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name spark.proflowenergy.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name spark.proflowenergy.org;

    # ── SSL — certbot drops these in automatically when you run it ──
    ssl_certificate     /etc/letsencrypt/live/spark.proflowenergy.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spark.proflowenergy.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── Client: static React build ─────────────────────────
    root /var/www/spark/client/build;
    index index.html;

    # SPA fallback — every non-file route serves index.html so React Router works.
    location / {
        try_files $uri /index.html;
    }

    # ── API + Socket.io — proxied to the Node server on :5001 ──
    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 25m;         # photo + voice-note uploads
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Long-cache hashed assets from CRA's build output.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
